<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuition Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --secondary: #9333ea;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); padding: 20px; }

        .container { max-width: 500px; margin: 0 auto; }

        /* Premium Dynamic Header */
        .status-card {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            border-radius: 24px; padding: 25px; color: white;
            margin-bottom: 25px; box-shadow: 0 15px 30px rgba(79, 70, 229, 0.2);
        }

        .status-card h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; }
        .status-card p { opacity: 0.9; font-size: 0.9rem; font-weight: 500; }

        .section-title {
            font-size: 1.1rem; font-weight: 700; color: var(--text-sub);
            margin-bottom: 15px; display: flex; justify-content: space-between;
        }

        /* Student Card Look */
        .student-card {
            background: var(--card-bg); border-radius: 22px; padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-header { display: flex; align-items: center; margin-bottom: 15px; }

        .avatar {
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 700; color: white; margin-right: 15px;
        }

        .riyad-col { background: #3b82f6; }
        .tanzid-col { background: #a855f7; }
        .fardin-col { background: #10b981; }
        .niyaz-col { background: #f43f5e; }

        .info h3 { font-size: 1.1rem; font-weight: 700; }
        .due-tag {
            color: #ef4444; font-size: 0.7rem; font-weight: 800;
            background: #fee2e2; padding: 2px 8px; border-radius: 6px; margin-left: 8px;
        }

        /* Progress Bar */
        .bar-bg { height: 10px; background: #f1f5f9; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; transition: width 0.6s ease; }

        .dots { display: flex; gap: 5px; margin-top: 10px; }
        .dot { width: 100%; height: 5px; border-radius: 10px; background: #e2e8f0; }

        /* Admin Button (Not Floating) */
        .footer-admin {
            margin-top: 40px; text-align: center; padding: 20px 0;
            border-top: 1px solid var(--border);
        }
        
        .admin-btn {
            background: none; border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 12px; cursor: pointer;
            color: var(--text-sub); font-size: 1.2rem; transition: 0.3s;
        }
        .admin-btn:hover { border-color: var(--primary); color: var(--primary); background: white; }

        /* Admin Panel Styling */
        #admin-panel {
            background: white; border-radius: 24px; padding: 25px;
            margin-top: 20px; border: 2px solid var(--primary);
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: var(--text-sub); }
        .input-group input {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid var(--border); outline: none;
        }

        .btn-main {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary); color: white; font-weight: 700; cursor: pointer; margin-bottom: 20px;
        }

        .btn-reset {
            padding: 6px 12px; font-size: 0.8rem; border-radius: 8px;
            border: 1px solid #fee2e2; background: #fff1f2; color: #ef4444; cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-card">
            <h2 id="display-title">Next Class: Sunday</h2>
            <p id="display-subtitle">Regular Time: 4:00 PM</p>
        </div>

        <div class="section-title">
            <span>Student Tracker</span>
            <span style="font-size: 0.8rem;">Target: 12</span>
        </div>

        <div id="student-list"></div>

        <div class="footer-admin">
            <button class="admin-btn" id="admin-open-btn">⚙️</button>
        </div>

        <div id="admin-panel" class="hidden">
            <h3 style="margin-bottom: 20px;">Settings</h3>
            
            <div class="input-group">
                <label>Header Title (e.g. Next Class: Sunday)</label>
                <input type="text" id="input-title" placeholder="Enter title...">
            </div>
            <div class="input-group">
                <label>Header Subtitle (e.g. Regular Time: 4:00 PM)</label>
                <input type="text" id="input-subtitle" placeholder="Enter subtitle...">
            </div>
            <button class="btn-main" onclick="updateHeader()">Update Status Board</button>

            <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid var(--border);">
            
            <button class="btn-main" style="background: #10b981;" onclick="addLecture()">Add +1 Lecture to All</button>
            <div id="admin-student-controls"></div>
            
            <button class="btn-main" style="background: #64748b; margin-top: 20px;" onclick="closeAdmin()">Close Settings</button>
        </div>
    </div>

    <script>
        // Data Structure
        const defaultStudents = [
            { id: 1, name: "Riyad", count: 7, isDue: false, col: "riyad-col" },
            { id: 2, name: "Tanzid", count: 12, isDue: true, col: "tanzid-col" },
            { id: 3, name: "Fardin", count: 9, isDue: false, col: "fardin-col" },
            { id: 4, name: "Niyaz", count: 4, isDue: false, col: "niyaz-col" }
        ];

        let students = JSON.parse(localStorage.getItem('ultra_v2_data')) || defaultStudents;
        let headerInfo = JSON.parse(localStorage.getItem('ultra_v2_header')) || { title: "Next Class: Sunday", subtitle: "Regular Time: 4:00 PM" };

        function render() {
            // Update Header
            document.getElementById('display-title').innerText = headerInfo.title;
            document.getElementById('display-subtitle').innerText = headerInfo.subtitle;
            document.getElementById('input-title').value = headerInfo.title;
            document.getElementById('input-subtitle').value = headerInfo.subtitle;

            const list = document.getElementById('student-list');
            const adminCtrls = document.getElementById('admin-student-controls');
            list.innerHTML = '';
            adminCtrls.innerHTML = '';

            students.forEach(s => {
                const perc = Math.min((s.count / 12) * 100, 100);
                
                // Dashboard Card
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="avatar ${s.col}">${s.name[0]}</div>
                        <div class="info">
                            <h3>${s.name} ${s.isDue ? '<span class="due-tag">DUE</span>' : ''}</h3>
                            <p style="font-size: 0.8rem; color: var(--text-sub);">${s.count}/12 Lectures completed</p>
                        </div>
                    </div>
                    <div class="bar-bg"><div class="bar-fill ${s.col}" style="width: ${perc}%"></div></div>
                    <div class="dots">
                        ${Array(12).fill(0).map((_, i) => `<div class="dot" style="background: ${i < s.count ? 'var(--primary)' : '#e2e8f0'}"></div>`).join('')}
                    </div>
                `;
                list.appendChild(card);

                // Admin Controls
                const ctrl = document.createElement('div');
                ctrl.style.display = "flex";
                ctrl.style.justifyContent = "space-between";
                ctrl.style.alignItems = "center";
                ctrl.style.marginBottom = "10px";
                ctrl.innerHTML = `
                    <span style="font-weight:600;">${s.name} (${s.count})</span>
                    <button class="btn-reset" onclick="clearDue(${s.id})">Clear Due</button>
                `;
                adminCtrls.appendChild(ctrl);
            });

            localStorage.setItem('ultra_v2_data', JSON.stringify(students));
            localStorage.setItem('ultra_v2_header', JSON.stringify(headerInfo));
        }

        // Admin Functions
        function updateHeader() {
            headerInfo.title = document.getElementById('input-title').value;
            headerInfo.subtitle = document.getElementById('input-subtitle').value;
            render();
            alert("Status board updated!");
        }

        function addLecture() {
            students = students.map(s => {
                const newCount = s.count + 1;
                return { ...s, count: newCount, isDue: newCount >= 12 ? true : s.isDue };
            });
            render();
        }

        function clearDue(id) {
            students = students.map(s => s.id === id ? { ...s, isDue: false } : s);
            render();
        }

        document.getElementById('admin-open-btn').onclick = () => {
            if(prompt("Password:") === "945462") {
                document.getElementById('admin-panel').classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        };

        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuition Tracker Pro</title>
    <style>
        /* Modern English UI */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -1px;
        }

        p.subtitle { color: #94a3b8; margin-top: 10px; font-size: 1.1rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        /* Student Card Design */
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: var(--primary);
        }

        .card.due::before { background: var(--danger); }
        .card.due { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.3); }

        .name { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; color: #fff; }
        
        .lecture-count {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
        }

        .unit { font-size: 1.1rem; color: #94a3b8; font-weight: 400; margin-left: 5px; }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-paid { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-due { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* Admin Section Styling */
        .admin-access { margin-top: 150px; text-align: center; }
        .tiny-btn { background: transparent; border: none; color: #334155; font-size: 12px; cursor: pointer; padding: 10px; }

        #admin-panel {
            margin-top: 50px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 32px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: 0.3s;
            margin-bottom: 40px;
        }

        .btn-main:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6); }

        .btn-reset {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--card-border);
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-reset:hover { background: var(--success); border-color: var(--success); color: #fff; }

        .hidden { display: none; }
        
        .logout-btn { background: transparent; color: #94a3b8; border: none; cursor: pointer; text-decoration: underline; font-size: 0.9rem; margin-top: 20px;}
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Tuition Tracker Pro</h1>
            <p class="subtitle">Student Attendance & Payment Status</p>
        </header>
        
        <div id="student-grid" class="grid"></div>

        <div class="admin-access">
            <button id="admin-login-btn" class="tiny-btn">.</button>
        </div>

        <div id="admin-panel" class="hidden">
            <h2 style="margin-bottom: 10px; font-size: 2rem;">Management Panel</h2>
            <p style="color: #94a3b8; margin-bottom: 30px;">Control lecture counts and reset payments.</p>
            
            <button onclick="incrementAll()" class="btn-main">Class Held Today (+1 All)</button>
            
            <div id="admin-student-grid" class="grid"></div>
            
            <br>
            <button onclick="logout()" class="logout-btn">Close Admin Panel</button>
        </div>
    </div>

    <script>
        // Updated Names
        const defaultData = [
            { id: 1, name: "Riyad", lectures: 7, isDue: false },
            { id: 2, name: "Tanzid", lectures: 1, isDue: true },
            { id: 3, name: "Fardin", lectures: 9, isDue: false },
            { id: 4, name: "Niyaz", lectures: 4, isDue: false }
        ];

        let students = JSON.parse(localStorage.getItem('tracker_v3')) || defaultData;

        function render() {
            const sGrid = document.getElementById('student-grid');
            const aGrid = document.getElementById('admin-student-grid');
            sGrid.innerHTML = '';
            aGrid.innerHTML = '';

            students.forEach(s => {
                // Public View Card
                const sCard = document.createElement('div');
                sCard.className = `card ${s.isDue ? 'due' : ''}`;
                sCard.innerHTML = `
                    <div class="name">${s.name}</div>
                    <div class="lecture-count">${s.lectures}<span class="unit">Days</span></div>
                    <div class="status-badge ${s.isDue ? 'status-due' : 'status-paid'}">
                        ${s.isDue ? '⚠️ Payment Due' : '✓ Active Cycle'}
                    </div>
                `;
                sGrid.appendChild(sCard);

                // Admin Control Card
                const aCard = document.createElement('div');
                aCard.className = 'card';
                aCard.innerHTML = `
                    <div class="name">${s.name}</div>
                    <p style="color: #94a3b8">Current: ${s.lectures}</p>
                    <button onclick="resetStudent(${s.id})" class="btn-reset">Reset & Paid</button>
                `;
                aGrid.appendChild(aCard);
            });

            localStorage.setItem('tracker_v3', JSON.stringify(students));
        }

        function incrementAll() {
            students = students.map(s => {
                let count = s.lectures + 1;
                // Auto-mark as due at 12 lectures
                return { ...s, lectures: count, isDue: count >= 12 ? true : s.isDue };
            });
            render();
        }

        function resetStudent(id) {
            if(confirm("Confirm payment received and reset count to 0?")) {
                students = students.map(s => {
                    if (s.id === id) return { ...s, isDue: false, lectures: 0 };
                    return s;
                });
                render();
            }
        }

        document.getElementById('admin-login-btn').addEventListener('click', () => {
            const p = prompt("Enter Admin Password:");
            if (p === "945462") {
                document.getElementById('admin-panel').classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else if(p !== null) {
                alert("Access Denied: Incorrect Password.");
            }
        });

        function logout() {
            document.getElementById('admin-panel').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture & Payment Tracker</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            text-align: center;
        }

        h1 { margin-bottom: 30px; color: #0f172a; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-top: 6px solid var(--primary);
            position: relative;
        }

        .due {
            border-top-color: var(--danger);
            background: #fff1f2;
        }

        .status-due {
            color: var(--danger);
            font-weight: bold;
            font-size: 0.9rem;
            background: #ffe4e6;
            padding: 5px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .admin-access {
            margin-top: 100px;
            opacity: 0.2;
        }

        .tiny-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 8px;
            cursor: pointer;
        }

        #admin-panel {
            background: #e2e8f0;
            padding: 30px;
            border-radius: 20px;
            margin-top: 40px;
            border: 2px dashed #94a3b8;
        }

        .hidden { display: none; }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-reset {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>লেকচার ও পেমেন্ট ট্র্যাকার</h1>
        
        <div id="student-grid" class="grid"></div>

        <div class="admin-access">
            <button id="admin-login-btn" class="tiny-btn">.</button>
        </div>

        <div id="admin-panel" class="hidden">
            <hr>
            <h2>অ্যাডমিন প্যানেল</h2>
            <button onclick="incrementAll()" class="btn-main">আজকের ক্লাস হয়েছে</button>
            <div id="admin-student-grid" class="grid"></div>
            <br>
            <button onclick="logout()" class="btn-secondary">লগ আউট</button>
        </div>
    </div>

    <script>
        // আপনার দেওয়া নাম অনুযায়ী প্রাথমিক ডেটা
        const defaultData = [
            { id: 1, name: "Riyad", lectures: 7, isDue: false },
            { id: 2, name: "Tanzid", lectures: 1, isDue: true },
            { id: 3, name: "Fardin", lectures: 9, isDue: false },
            { id: 4, name: "Niyaz", lectures: 4, isDue: false }
        ];

        let students = JSON.parse(localStorage.getItem('tracker_v1')) || defaultData;

        function render() {
            const sGrid = document.getElementById('student-grid');
            const aGrid = document.getElementById('admin-student-grid');
            sGrid.innerHTML = '';
            aGrid.innerHTML = '';

            students.forEach(s => {
                // Public View
                const sCard = document.createElement('div');
                sCard.className = `card ${s.isDue ? 'due' : ''}`;
                sCard.innerHTML = `
                    <h3>${s.name}</h3>
                    <p>লেকচার: <strong>${s.lectures}</strong></p>
                    ${s.isDue ? '<div class="status-due">পেমেন্ট ডিউ</div>' : ''}
                `;
                sGrid.appendChild(sCard);

                // Admin View
                const aCard = document.createElement('div');
                aCard.className = 'card';
                aCard.innerHTML = `
                    <h3>${s.name}</h3>
                    <p>কাউন্ট: ${s.lectures}</p>
                    <button onclick="resetStudent(${s.id})" class="btn-reset">রিসেট (পেমেন্ট সম্পন্ন)</button>
                `;
                aGrid.appendChild(aCard);
            });

            localStorage.setItem('tracker_v1', JSON.stringify(students));
        }

        function incrementAll() {
            students = students.map(s => {
                let count = s.lectures + 1;
                return { ...s, lectures: count, isDue: count >= 12 ? true : s.isDue };
            });
            render();
        }

        function resetStudent(id) {
            students = students.map(s => {
                if (s.id === id) {
                    return { ...s, isDue: false, lectures: 0 };
                }
                return s;
            });
            render();
        }

        document.getElementById('admin-login-btn').addEventListener('click', () => {
            const p = prompt("পাসওয়ার্ড দিন:");
            if (p === "945462") {
                document.getElementById('admin-panel').classList.remove('hidden');
                window.scrollTo(0, document.body.scrollHeight);
            } else if(p !== null) {
                alert("ভুল পাসওয়ার্ড!");
            }
        });

        function logout() {
            document.getElementById('admin-panel').classList.add('hidden');
            window.scrollTo(0,0);
        }

        render();
    </script>
</body>
</html>
